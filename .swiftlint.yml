# .swiftlint.yml
# SwiftLint configuration for CoinGecko SDK

# Paths to include/exclude
included:
  - Sources
  - Tests

excluded:
  - .build
  - Fastlane
  - Build
  - Pods

# Rule configuration
disabled_rules:
  - trailing_whitespace # Handled by editor
  - todo # We allow TODOs in development

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_access_control
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_random
  - let_var_whitespace
  - literal_expression_end_indentation
  - modifier_order
  - nimble_operator
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Custom rule parameters
line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 8

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
    error: 3
  statement_level:
    warning: 5
    error: 10

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 60
  excluded:
    - id
    - URL
    - url
    - API
    - api
    - SDK
    - sdk

# Configuration for built-in explicit_access_control rule
explicit_access_control:
  excluded:
    - case  # Exclude enum cases since Swift doesn't support access control on them

# Custom rules
custom_rules:
  # Avoid print statements in production code
  no_print:
    name: "No Print Statements"
    regex: '\bprint\s*\('
    match_kinds:
      - identifier
    message: "Use proper logging instead of print statements"
    severity: warning
    included: "Sources/.*\\.swift"

  # Force documentation for public APIs
  public_docs:
    name: "Public API Documentation"
    regex: '^public\s+(class|struct|enum|func|var|let)(?!.*\/\/\/)'
    message: "Public APIs should have documentation comments"
    severity: warning

# Reporter
reporter: "xcode"